version: 0.0
os: linux

files:
  - source: /build
    destination: /var/www/html

file_exists_behavior: OVERWRITE

hooks:
  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: ubuntu

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: ubuntu
