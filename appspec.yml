version: 0.0
os: linux

files:
  - source: build/
    destination: /var/www/html/react
    overwrite: true

permissions:
  - object: /var/www/html/react
    pattern: "**"
    owner: ubuntu
    group: ubuntu
    mode: 755

hooks:
  AfterInstall:
    - location: scripts/deploy.sh
      timeout: 300
      runas: ubuntu
